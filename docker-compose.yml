version: "3.9"

services:
  app:
    build: .
    container_name: shootyourself
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - DOMAIN=${DOMAIN:-localhost}
      - PORT=3000
      - FETCH_TIMEOUT=15000
    volumes:
      - shootyourself-data:/app/backend/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"http.get('http://127.0.0.1:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    container_name: shootyourself-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      - app

volumes:
  shootyourself-data:
  caddy_data:
