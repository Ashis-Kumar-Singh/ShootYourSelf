<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SYS — Admin Dashboard</title>
<link rel="icon" href="images/symbol.svg" type="image/svg+xml">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta property="og:image" content="images/symbol.svg"/>
<meta name="twitter:card" content="summary_large_image"/>
<link rel="apple-touch-icon" href="images/symbol.svg"/>
<script>
  window.tailwind = window.tailwind || {};
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#0F766E", "accent": "#EA580C", "bg": "#FAFAF9",
          "surface": "#FFFFFF", "surface-sunken": "#F5F5F4",
          "border": "#E7E5E4", "muted": "#64748B", "text": "#0F172A",
          "text-secondary": "#334155",
          "forest-deep": "#0F766E", "accent-orange": "#EA580C", "ink-gray": "#64748B",
          "outline-variant": "#E7E5E4"
        },
        fontFamily: {
          headline: ["Libre Caslon Text","Georgia","serif"],
          body: ["Hanken Grotesk","system-ui","sans-serif"],
          mono: ["JetBrains Mono","monospace"]
        }
      }
    }
  }
</script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:wght@400;700&family=Hanken+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&display=swap" rel="stylesheet"/>

<link href="styles.css?v=4" rel="stylesheet"/>
</head>
<body class="app-body">
<header class="app-header">
  <div class="app-header__brand">
    <div class="app-header__logo">AD</div>
    <span>Admin Panel</span>
  </div>
  <nav class="app-header__nav" data-nav>
    <a href="/"><img src="images/icon-terminal.svg" alt="" class="nav-icon" width="20" height="20">Systems</a>
    <a href="community.html"><img src="images/icon-community.svg" alt="" class="nav-icon" width="20" height="20">Archive</a>
    <a href="ecosystem.html"><img src="images/icon-book.svg" alt="" class="nav-icon" width="20" height="20">Manuals</a>
  </nav>
  <div class="app-header__spacer"></div>
  <div class="app-header__actions">
    <a href="admin.html">Admin</a>
    <span class="sep">|</span>
    <a href="privacy.html">Privacy</a>
    <button id="darkModeToggle" class="icon-btn" aria-label="Toggle dark mode">
      <img src="images/icon-dark-mode.svg" alt="" class="nav-icon" width="22" height="22">
    </button>
    <div class="user-pill">
      <span class="user-pill__avatar">T</span>
      <span>T-4029</span>
    </div>
  </div>
</header>

<main class="app-main">
  <div class="app-main__inner">
    <div class="page-head">
      <div class="page-head__title">
        <div class="page-head__icon">AD</div>
        <div>
          <h1>Admin Panel</h1>
          <p>System administration and monitoring</p>
        </div>
      </div>
      <div class="page-head__actions">
        <button class="btn btn--secondary btn--sm" onclick="setAdminKey()">
          <img src="images/icon-fingerprint.svg" alt="" class="nav-icon" width="20" height="20"> Set Key
        </button>
        <button class="btn btn--secondary btn--sm" onclick="clearAdminKey()">
          <img src="images/icon-offline.svg" alt="" class="nav-icon" width="20" height="20"> Clear Key
        </button>
        <button class="btn btn--primary btn--sm" onclick="refreshAll()">
          <img src="images/icon-telemetry.svg" alt="" class="nav-icon" width="20" height="20"> Refresh
        </button>
        <span class="mono-label" id="uptimeDisplay" style="font-size:11px;align-self:center;margin-left:8px"></span>
      </div>
    </div>

    <nav class="tabs" id="tabNav">
      <button class="tab tab-btn is-active" data-tab="overview" onclick="switchTab('overview')">
        <img src="images/icon-monitor.svg" alt="" class="nav-icon" width="20" height="20"> Overview
      </button>
      <button class="tab tab-btn" data-tab="engines" onclick="switchTab('engines')">
        <img src="images/icon-visual.svg" alt="" class="nav-icon" width="20" height="20"> Engines
      </button>
      <button class="tab tab-btn" data-tab="feedback" onclick="switchTab('feedback')">
        <img src="images/icon-telemetry.svg" alt="" class="nav-icon" width="20" height="20"> Feedback
      </button>
      <button class="tab tab-btn" data-tab="popular" onclick="switchTab('popular')">
        <img src="images/icon-telemetry.svg" alt="" class="nav-icon" width="20" height="20"> Popular
      </button>
      <button class="tab tab-btn" data-tab="upvotes" onclick="switchTab('upvotes')">
        <img src="images/icon-community.svg" alt="" class="nav-icon" width="20" height="20"> Upvotes
      </button>
      <button class="tab tab-btn" data-tab="recent" onclick="switchTab('recent')">
        <img src="images/icon-terminal.svg" alt="" class="nav-icon" width="20" height="20"> Recent
      </button>
      <button class="tab tab-btn" data-tab="cache" onclick="switchTab('cache')">
        <img src="images/icon-memory.svg" alt="" class="nav-icon" width="20" height="20"> Cache
      </button>
    </nav>

    <div id="dashboardContent">
      <div class="glass-surface" style="padding:32px;text-align:center">
        <p style="color:var(--color-text-muted)">Loading dashboard...</p>
      </div>
    </div>
  </div>
</main>

<div class="toast-container" id="toastContainer"></div>

<script>
  var currentTab = 'overview';
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(function(b) {
      b.classList.remove('is-active');
    });
    var btn = document.querySelector('.tab-btn[data-tab="' + tab + '"]');
    if (btn) {
      btn.classList.add('is-active');
    }
    loadTabContent(tab);
  }
  switchTab('overview');
</script>
<script src="js/api.js?v=20260601-1"></script>
<script src="js/admin.js?v=20260601-1"></script>
<script src="js/chrome.js?v=20260601-1"></script>
</body>
</html>
