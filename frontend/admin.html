<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ShootYourSelf — Admin Dashboard</title>
<link rel="icon" href="images/symbol.svg" type="image/svg+xml">
<script>
  window.tailwind = window.tailwind || {};
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          "forest-deep": "#0F403A", "accent-orange": "#C86A2C", "accent-orange-vibrant": "#E87C36",
          "bg-cream": "#F6F0E6", "ink-black": "#0A0A0A", "ink-gray": "#4A4A4A",
          "surface": "#f9f9f8", "surface-container-low": "#f3f4f2", "surface-container-high": "#e8e8e7",
          "primary": "#002924", "on-background": "#1a1c1b", "on-surface-variant": "#404847",
          "outline-variant": "#c0c8c6", "primary-container": "#0f403a"
        },
        fontFamily: {
          "headline": ["Libre Caslon Text", "serif"],
          "body": ["Hanken Grotesk", "sans-serif"],
          "mono-label": ["JetBrains Mono", "monospace"]
        }
      }
    }
  }
</script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:wght@400;700&amp;family=Hanken+Grotesk:wght@400;500;600&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="styles.css" rel="stylesheet"/>
</head>
<body class="bg-bg-cream text-on-background font-body min-h-screen">
<div class="max-w-6xl mx-auto p-4 md:p-8">
  <header class="flex flex-wrap justify-between items-center gap-3 mb-6">
    <div class="flex items-center gap-3">
      <a href="/" class="w-9 h-9 rounded-lg bg-gradient-to-br from-forest-deep to-accent-orange flex items-center justify-center text-white font-headline font-bold text-sm hover:opacity-90 transition-all">SY</a>
      <h1 class="font-headline text-2xl font-bold text-forest-deep">Admin</h1>
      <span class="text-xs text-ink-gray font-mono-label" id="uptimeDisplay"></span>
    </div>
    <div class="flex gap-2">
      <button class="inline-flex items-center gap-1.5 px-4 py-2 rounded-lg border border-outline-variant/30 bg-white/70 text-sm font-semibold hover:bg-surface-container-high transition-all" onclick="setAdminKey()">
        <span class="material-symbols-outlined text-lg">key</span> Set Key
      </button>
      <button class="inline-flex items-center gap-1.5 px-4 py-2 rounded-lg border border-outline-variant/30 bg-white/70 text-sm font-semibold hover:bg-surface-container-high transition-all" onclick="clearAdminKey()">
        <span class="material-symbols-outlined text-lg">logout</span> Clear Key
      </button>
      <button class="inline-flex items-center gap-1.5 px-4 py-2 rounded-lg border border-outline-variant/30 bg-white/70 text-sm font-semibold hover:bg-surface-container-high transition-all" onclick="refreshAll()">
        <span class="material-symbols-outlined text-lg">refresh</span> Refresh
      </button>
    </div>
  </header>

  <nav class="flex gap-1 mb-6 overflow-x-auto" id="tabNav">
    <button class="tab-btn inline-flex items-center gap-2 px-4 py-2.5 rounded-lg text-sm font-semibold transition-all whitespace-nowrap" data-tab="overview" onclick="switchTab('overview')">
      <span class="material-symbols-outlined text-lg">dashboard</span> Overview
    </button>
    <button class="tab-btn inline-flex items-center gap-2 px-4 py-2.5 rounded-lg text-sm font-semibold transition-all whitespace-nowrap" data-tab="engines" onclick="switchTab('engines')">
      <span class="material-symbols-outlined text-lg">travel_explore</span> Engines
    </button>
    <button class="tab-btn inline-flex items-center gap-2 px-4 py-2.5 rounded-lg text-sm font-semibold transition-all whitespace-nowrap" data-tab="feedback" onclick="switchTab('feedback')">
      <span class="material-symbols-outlined text-lg">bar_chart</span> Feedback
    </button>
    <button class="tab-btn inline-flex items-center gap-2 px-4 py-2.5 rounded-lg text-sm font-semibold transition-all whitespace-nowrap" data-tab="popular" onclick="switchTab('popular')">
      <span class="material-symbols-outlined text-lg">trending_up</span> Popular
    </button>
    <button class="tab-btn inline-flex items-center gap-2 px-4 py-2.5 rounded-lg text-sm font-semibold transition-all whitespace-nowrap" data-tab="upvotes" onclick="switchTab('upvotes')">
      <span class="material-symbols-outlined text-lg">thumb_up</span> Upvotes
    </button>
    <button class="tab-btn inline-flex items-center gap-2 px-4 py-2.5 rounded-lg text-sm font-semibold transition-all whitespace-nowrap" data-tab="recent" onclick="switchTab('recent')">
      <span class="material-symbols-outlined text-lg">history</span> Recent
    </button>
    <button class="tab-btn inline-flex items-center gap-2 px-4 py-2.5 rounded-lg text-sm font-semibold transition-all whitespace-nowrap" data-tab="cache" onclick="switchTab('cache')">
      <span class="material-symbols-outlined text-lg">storage</span> Cache
    </button>
  </nav>

  <div id="dashboardContent" class="space-y-6">
    <div class="glass-surface rounded-xl p-8 text-center">
      <p class="text-ink-gray">Loading dashboard...</p>
    </div>
  </div>
</div>

<script>
  var currentTab = 'overview';
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(function(b) {
      b.classList.remove('bg-forest-deep', 'text-white', 'border-forest-deep');
      b.classList.add('bg-white/80');
    });
    var btn = document.querySelector('.tab-btn[data-tab="' + tab + '"]');
    if (btn) {
      btn.classList.remove('bg-white/80');
      btn.classList.add('bg-forest-deep', 'text-white', 'border-forest-deep');
    }
    loadTabContent(tab);
  }
  switchTab('overview');
</script>
<script src="js/api.js?v=20260524-5"></script>
<script src="js/admin.js"></script>
</body>
</html>
