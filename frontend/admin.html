<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SYS — Admin Dashboard</title>
<link rel="icon" href="images/symbol.svg" type="image/svg+xml">
<script>
  window.tailwind = window.tailwind || {};
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#0F766E", "accent": "#EA580C", "bg": "#FAFAF9",
          "surface": "#FFFFFF", "surface-sunken": "#F5F5F4",
          "border": "#E7E5E4", "muted": "#64748B", "text": "#0F172A",
          "text-secondary": "#334155",
          "forest-deep": "#0F766E", "accent-orange": "#EA580C", "ink-gray": "#64748B",
          "outline-variant": "#E7E5E4"
        },
        fontFamily: {
          headline: ["Libre Caslon Text","Georgia","serif"],
          body: ["Hanken Grotesk","system-ui","sans-serif"],
          mono: ["JetBrains Mono","monospace"]
        }
      }
    }
  }
</script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:wght@400;700&family=Hanken+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="styles.css" rel="stylesheet"/>
<style>
  .stat-value { font-family: var(--font-mono); font-size: var(--fs-30); font-weight: 700; color: var(--color-text); line-height: 1.1; letter-spacing: -0.02em; }
  .stat-label { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--color-text-muted); margin-top: 4px; font-weight: 500; }
  .badge-green { background: var(--color-success-soft); color: var(--color-success); display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: 9999px; font-family: var(--font-mono); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
  .badge-red { background: var(--color-danger-soft); color: var(--color-danger); display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: 9999px; font-family: var(--font-mono); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
  .badge-blue { background: var(--color-info-soft); color: var(--color-info); display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: 9999px; font-family: var(--font-mono); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
  .badge-orange { background: var(--color-accent-soft); color: var(--color-accent-strong); display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: 9999px; font-family: var(--font-mono); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
  .trust-meter { display: flex; align-items: center; gap: 8px; font-size: var(--fs-13); }
  .trust-bar { flex: 1; height: 4px; border-radius: 9999px; background: var(--color-bg-subtle); overflow: hidden; }
  .trust-bar-fill { height: 100%; border-radius: 9999px; transition: width 300ms ease; }
  .trust-bar-fill.high { background: var(--color-success); }
  .trust-bar-fill.medium { background: var(--color-warning); }
  .trust-bar-fill.low { background: var(--color-danger); }
  .font-mono-label { font-family: var(--font-mono); }
</style>
</head>
<body style="background:var(--color-bg);color:var(--color-text);font-family:var(--font-body);min-height:100vh">
<header class="app-header">
  <div class="app-header__brand">
    <div class="app-header__logo">AD</div>
    <span>Admin Panel</span>
  </div>
  <nav class="app-header__nav" data-nav>
    <a href="/">Systems</a>
    <a href="community.html">Archive</a>
    <a href="ecosystem.html">Manuals</a>
  </nav>
  <div class="app-header__spacer"></div>
  <div class="app-header__actions">
    <a href="admin.html">Admin</a>
    <span class="sep">|</span>
    <a href="privacy.html">Privacy</a>
    <button id="darkModeToggle" class="icon-btn" aria-label="Toggle dark mode">
      <span class="material-symbols-outlined">dark_mode</span>
    </button>
    <div class="user-pill">
      <span class="user-pill__avatar">T</span>
      <span>T-4029</span>
    </div>
  </div>
</header>

<main class="app-main">
  <div class="app-main__inner">
    <div class="page-head">
      <div class="page-head__title">
        <div class="page-head__icon">AD</div>
        <div>
          <h1>Admin Panel</h1>
          <p>System administration and monitoring</p>
        </div>
      </div>
      <div class="page-head__actions">
        <button class="btn btn--secondary btn--sm" onclick="setAdminKey()">
          <span class="material-symbols-outlined">key</span> Set Key
        </button>
        <button class="btn btn--secondary btn--sm" onclick="clearAdminKey()">
          <span class="material-symbols-outlined">logout</span> Clear Key
        </button>
        <button class="btn btn--primary btn--sm" onclick="refreshAll()">
          <span class="material-symbols-outlined">refresh</span> Refresh
        </button>
        <span class="mono-label" id="uptimeDisplay" style="font-size:11px;align-self:center;margin-left:8px"></span>
      </div>
    </div>

    <nav class="tabs" id="tabNav">
      <button class="tab tab-btn is-active" data-tab="overview" onclick="switchTab('overview')">
        <span class="material-symbols-outlined">dashboard</span> Overview
      </button>
      <button class="tab tab-btn" data-tab="engines" onclick="switchTab('engines')">
        <span class="material-symbols-outlined">travel_explore</span> Engines
      </button>
      <button class="tab tab-btn" data-tab="feedback" onclick="switchTab('feedback')">
        <span class="material-symbols-outlined">bar_chart</span> Feedback
      </button>
      <button class="tab tab-btn" data-tab="popular" onclick="switchTab('popular')">
        <span class="material-symbols-outlined">trending_up</span> Popular
      </button>
      <button class="tab tab-btn" data-tab="upvotes" onclick="switchTab('upvotes')">
        <span class="material-symbols-outlined">thumb_up</span> Upvotes
      </button>
      <button class="tab tab-btn" data-tab="recent" onclick="switchTab('recent')">
        <span class="material-symbols-outlined">history</span> Recent
      </button>
      <button class="tab tab-btn" data-tab="cache" onclick="switchTab('cache')">
        <span class="material-symbols-outlined">storage</span> Cache
      </button>
    </nav>

    <div id="dashboardContent">
      <div class="glass-surface" style="padding:32px;text-align:center">
        <p style="color:var(--color-text-muted)">Loading dashboard...</p>
      </div>
    </div>
  </div>
</main>

<div class="toast-container" id="toastContainer"></div>

<script>
  var currentTab = 'overview';
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(function(b) {
      b.classList.remove('is-active');
    });
    var btn = document.querySelector('.tab-btn[data-tab="' + tab + '"]');
    if (btn) {
      btn.classList.add('is-active');
    }
    loadTabContent(tab);
  }
  switchTab('overview');
</script>
<script src="js/api.js?v=20260601-1"></script>
<script src="js/admin.js?v=20260601-1"></script>
<script src="js/chrome.js?v=20260601-1"></script>
</body>
</html>
