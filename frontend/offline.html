<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SYS — Offline Mode</title>
<link rel="icon" href="images/symbol.svg" type="image/svg+xml">
<script>
window.tailwind=window.tailwind||{};
tailwind.config={darkMode:"class",theme:{extend:{colors:{
primary:"#0F766E",accent:"#EA580C",bg:"#FAFAF9",
surface:"#FFFFFF","surface-sunken":"#F5F5F4",
border:"#E7E5E4",muted:"#64748B",text:"#0F172A","text-secondary":"#334155"
},fontFamily:{headline:["Libre Caslon Text","Georgia","serif"],body:["Hanken Grotesk","system-ui","sans-serif"],mono:["JetBrains Mono","monospace"]}}}};
</script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:wght@400;700&family=Hanken+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="styles.css" rel="stylesheet"/>
</head>
<body style="background:var(--color-bg);color:var(--color-text);font-family:var(--font-body);min-height:100vh">
<header class="app-header" style="position:sticky;top:0;z-index:50">
  <div class="app-header__brand">
    <div class="app-header__logo">SYS</div>
    <span>Command Center</span>
  </div>
  <nav class="app-header__nav" data-nav>
    <a href="/">Systems</a>
    <a href="community.html">Archive</a>
    <a href="ecosystem.html">Manuals</a>
  </nav>
  <div class="app-header__spacer"></div>
  <div class="app-header__actions">
    <a href="admin.html">Admin</a>
    <span class="sep">|</span>
    <a href="privacy.html">Privacy</a>
    <button id="darkModeToggle" class="icon-btn" aria-label="Toggle dark mode">
      <span class="material-symbols-outlined">dark_mode</span>
    </button>
    <div class="user-pill">
      <span class="user-pill__avatar">T</span>
      <span>T-4029</span>
    </div>
  </div>
</header>
<div class="app-main__inner" style="max-width:1280px;margin:0 auto;padding:24px 16px">
  <div class="page-head">
    <div class="page-head__title">
      <div class="page-head__icon" style="background:linear-gradient(135deg,var(--color-primary),var(--color-accent))">OF</div>
      <div>
        <h1 style="font-family:var(--font-headline);font-size:var(--fs-30);font-weight:700;margin:0">Offline Mode</h1>
        <p style="color:var(--color-text-muted);font-size:var(--fs-14);margin-top:2px">Download repair packs for offline use</p>
      </div>
    </div>
  </div>

  <div class="page-nav">
    <a href="#" class="is-active" data-tab="browse">Browse Packs</a>
    <a href="#" data-tab="generate">Generate Pack</a>
  </div>

  <div id="offlineContent" style="min-height:200px">
    <div class="card" style="text-align:center;padding:48px">
      <p style="color:var(--color-text-muted)">Loading...</p>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="js/api.js?v=20260601-1"></script>
<script src="js/offline.js?v=20260601-1"></script>
<script src="js/chrome.js?v=20260601-1"></script>
</body>
</html>
